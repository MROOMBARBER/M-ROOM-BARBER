<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta tags pour le partage -->
    <title>M ROOM BARBER</title>
    <meta name="description" content="M ROOM BARBER - Barbier & Coiffeur Professionnel">
    
    <!-- Open Graph (WhatsApp/Instagram Preview) -->
    <meta property="og:title" content="M ROOM BARBER">
    <meta property="og:description" content="L'excellence du barbier traditionnel.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --whatsapp-color: #25D366;
            --maps-color: #4285F4;
            --instagram-color: #E1306C;
            --google-red: #EA4335; 
            --pure-black: #000000; /* K7el nichan */
            --gold: #c5a059; /* Al-lawn d-dhbi dyal l-logo */
            --gold-light: #e2c285;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', 'Times New Roman', serif;
        }

        body {
            background-color: var(--pure-black); /* Background k7el nichan */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            background: var(--pure-black);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.15); /* Shadow dhbiya khfifa */
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.4); /* Cadre dhbi bayen */
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            padding: 50px 20px 30px;
            background: #000000;
            position: relative;
        }

        /* Border decorative lines like in the logo */
        .header::after {
            content: '';
            display: block;
            width: 60%;
            height: 1px;
            background: var(--gold);
            margin: 20px auto 0;
            opacity: 0.6;
        }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.5));
        }

        h1 {
            display: none;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 300;
        }

        .links-container {
            padding: 40px 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.03); /* Background shafaf chwiya */
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn i {
            font-size: 20px;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        /* Bordered styles for better visibility on black */
        .whatsapp { border-color: var(--whatsapp-color); color: var(--whatsapp-color); }
        .instagram { border-color: var(--instagram-color); color: var(--instagram-color); }
        .maps { border-color: var(--maps-color); color: var(--maps-color); }
        .review { border-color: var(--gold); color: var(--gold); }

        .footer {
            padding: 25px;
            font-size: 11px;
            color: #666;
            background: #000000;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
        }

        .est-tag {
            font-size: 12px;
            color: var(--gold);
            margin-top: 5px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- Tswira dyal l-logo dyalk -->
        <img src="logo.png" alt="M ROOM BARBER LOGO" class="logo-img" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
        
        <!-- Fallback ila makantch l-tswira -->
        <div id="alt-logo" style="display:none; font-size: 40px; color: var(--gold); margin-bottom: 15px;">
            <i class="fas fa-cut"></i>
            <h2 style="font-size: 24px;">M ROOM</h2>
        </div>

        <p class="subtitle">Barbershop</p>
        <div class="est-tag">EST 2019</div>
    </div>

    <div class="links-container">
        <!-- WhatsApp -->
        <a href="https://wa.me/212629006432" target="_blank" class="btn whatsapp">
            <i class="fab fa-whatsapp"></i> WHATSAPP
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/THEMROOMOFFICIEL_" target="_blank" class="btn instagram">
            <i class="fab fa-instagram"></i> INSTAGRAM
        </a>

        <!-- Google Maps -->
        <a href="https://www.google.com/maps/place/The+M+Room+Barber/@33.5677466,-7.6537347,17z/data=!3m1!4b1!4m6!3m5!1s0xda7d30e1a6200cd:0x459d3f176cb65559!8m2!3d33.5677466!4d-7.6511598!16s%2Fg%2F11yl1383c3?entry=ttu" target="_blank" class="btn maps">
            <i class="fas fa-map-marker-alt"></i> GOOGLE MAPS
        </a>

        <!-- Google Review -->
        <a href="https://www.google.com/search?q=The+M+Room+Barber+Avis&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOcvVMCu0vbex3UK9zwa09BwsJHkHaEzqAOcP9eHUtX8wL-v74MfjZCh410JYDXpGin1k5xiUvgionGwtQ6EGcgcdFRTH" target="_blank" class="btn review">
            <i class="fab fa-google"></i> AVIS GOOGLE
        </a>
    </div>

    <div class="footer">
        &copy; 2026 M ROOM BARBER | ALL RIGHTS RESERVED
    </div>
</div>

</body>
</html>
